name: Update Ads Rules

on:
  schedule:
    # 每天北京时间 3:40 (UTC 19:40)
    - cron: '40 19 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ads-requests
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: pip install requests

      - name: Download and Process Ads Rules
        run: |
          python << 'EOF'
          import requests
          import re
          import os

          def get_data(url, is_yaml):
              print(f"LOG: Fetching {url}")
              try:
                  r = requests.get(url, timeout=20, headers={'User-Agent': 'Mozilla/5.0'})
                  r.raise_for_status()
                  if is_yaml:
                      # 提取 YAML 列表中的原始字符串，无论是否有前缀
                      return re.findall(r'^\s*-\s*[\'\"]?([^\'\"]+)[\'\"]?', r.text, re.MULTILINE)
                  # 提取文本行
                  return [l.strip() for l in r.text.splitlines() if l.strip() and not l.startswith(('#', '//'))]
              except Exception as e:
                  print(f"LOG: Skip {url} due to error: {e}")
                  return []

          # 1. 下载广告过滤资源
          s1 = get_data("https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml", True)
          s2 = get_data("https://pgl.yoyo.org/adservers/serverlist.php?hostformat=plain&showintro=0", False)
          s3 = get_data("https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomolite.yaml", True)
          
          raw_items = list(set(s1 + s2 + s3))
          if not raw_items:
              print("LOG: No data found. Exiting.")
              exit(0)

          print(f"LOG: Total raw items: {len(raw_items)}")

          # 2. 高效去重算法
          def clean_domain(d):
              # 仅在排序和父子域名比对时，临时剥离前缀
              return d.lstrip('+').lstrip('.')

          # 按纯域名倒序排序 (如 com.baidu.www)
          sorted_items = sorted(raw_items, key=lambda x: clean_domain(x).split('.')[::-1])

          final_list = []
          last_kept_clean = None
          
          for item in sorted_items:
              current_clean = clean_domain(item)
              # 比对时使用 current_clean，判断是否属于子域名或重复项
              if last_kept_clean and (current_clean == last_kept_clean or current_clean.endswith('.' + last_kept_clean)):
                  continue
              else:
                  # 写入时使用 item，保留源列表的原始格式（有前缀就有，没有就没有）
                  final_list.append(item)
                  last_kept_clean = current_clean

          print(f"LOG: Final items: {len(final_list)}")

          # 3. 写入文件
          out_file = 'rules/list/ads_domain.list'
          os.makedirs(os.path.dirname(out_file), exist_ok=True)
          with open(out_file, 'w', encoding='utf-8') as f:
              for line in sorted(final_list):
                  f.write(f"{line}\n")
          print(f"LOG: Saved to {out_file}")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add rules/list/ads_domain.list
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update Ads domain rules $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
