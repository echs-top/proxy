name: Auto Update

on:
  schedule:
    - cron: '53 18 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- 集中管理：沙盒滚动缓存集群 ---
      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Cache Image State
        uses: actions/cache@v4
        with:
          path: ~/.cache/img_state
          key: ${{ runner.os }}-img-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-img-state-

      - name: 📦 Cache Zashboard Env
        uses: actions/cache@v4
        with:
          path: ~/.cache/zashboard_env
          key: ${{ runner.os }}-zash-env-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-zash-env-

      # 升级：Mihomo 内核独立沙盒缓存
      - name: 📦 Cache Mihomo Core
        uses: actions/cache@v4
        with:
          path: ~/.cache/mihomo_core
          key: ${{ runner.os }}-mihomo-core-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-mihomo-core-

      # --- 环境初始化 ---
      - name: ⚙️ Setup Python Env
        run: |
          echo "=> Installing Python dependencies..."
          pip install -r .github/scripts/requirements.txt

      # --- 串行执行流水线 ---
      - name: 🔄 Phase 1 - Update Add Rules
        run: |
          echo "=> Fetching External Rules dynamically..."
          for script in .github/scripts/update-add-rules/*.py; do
            echo "Running $script..."
            python "$script"
          done

      - name: 🌳 Phase 2 - Update List Rules
        run: |
          echo "=> Building Rule Trees..."
          python .github/scripts/update-list-rules.py

      - name: 📦 Phase 3 - Convert MRS Rules
        run: |
          echo "=> Preparing Mihomo & Converting to MRS binary format..."
          chmod +x .github/scripts/update-mrs-rules.sh
          bash .github/scripts/update-mrs-rules.sh

      - name: 🖼️ Phase 4 - Update Images
        run: |
          echo "=> Fetching and updating images..."
          python .github/scripts/update-img.py

      - name: 🚀 Phase 5 - Build Zashboard
        run: |
          echo "=> Building and releasing Zashboard..."
          python .github/scripts/zashboard.py

      - name: 📝 Phase 6 - Update README
        run: |
          echo "=> Updating README.md statistics..."
          python .github/scripts/update-readme.py

      # --- 终极推送 ---
      - name: ⬆️ Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: Auto-update rules, MRS, images, zashboard and README"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
