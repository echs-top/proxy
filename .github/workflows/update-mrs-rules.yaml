name: Update Mrs Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '00 20 * * *'   # 每天 2:30 UTC

env:
  MIHOMO_OWNER: MetaCubeX
  MIHOMO_REPO: mihomo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 安装/缓存 Mihomo
      - name: 🔍 Get Latest Mihomo Release Tag
        id: get-version
        run: |
          LATEST_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ env.MIHOMO_OWNER }}/${{ env.MIHOMO_REPO }}/releases/latest" | jq -r .tag_name)
          if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "⚠️ Fallback: fetching all releases..."
            LATEST_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ env.MIHOMO_OWNER }}/${{ env.MIHOMO_REPO }}/releases" | jq -r '.[0].tag_name')
            if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
              echo "❌ Cannot fetch latest version"
              exit 1
            fi
          fi
          echo "✅ Latest version: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
        
      - name: ⚙️ Setup Mihomo Cache
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/mihomo
          key: ${{ runner.os }}-mihomo-${{ env.LATEST_TAG }}
          
      - name: 📥 Download and Install Mihomo
        if: steps.cache-mihomo.outputs.cache-hit != 'true'
        run: |
          FILE_NAME="mihomo-linux-amd64-${{ env.LATEST_TAG }}.gz"
          curl -fsSL -o "mihomo.gz" \
            "https://github.com/${{ env.MIHOMO_OWNER }}/${{ env.MIHOMO_REPO }}/releases/download/${{ env.LATEST_TAG }}/${FILE_NAME}"
          gunzip "mihomo.gz"
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

      # 2. 创建目录
      - name: 📂 Create Directories
        run: mkdir -p mrs/ip mrs/domain

      # 3. 转换本地 list 文件 → mrs
      - name: 🛠️ Convert List Rules to MRS
        run: |
          TEMP_DIR=$(mktemp -d)
          for dir in ip domain; do
            [ ! -d "list/$dir" ] && continue
            if [ "$dir" == "domain" ]; then
              BEHAVIOR="domain"
            else
              BEHAVIOR="ipcidr"
            fi
            mkdir -p "mrs/$dir"

            find "list/$dir" -type f | while read -r file; do
              filename=$(basename "$file")
              out_name="${filename%.*}.mrs"
              mrs_file="mrs/$dir/$out_name"
              
              # 比较源文件与目标 mrs 的修改时间
              INPUT_TIME=$(git log -1 --format=%at -- "$file" 2>/dev/null || stat -c %Y "$file")
              MRS_TIME=$(git log -1 --format=%at -- "$mrs_file" 2>/dev/null || echo 0)

              if [ "$INPUT_TIME" -gt "$MRS_TIME" ] || [ ! -f "$mrs_file" ]; then
                echo "🔄 Converting: $file → $mrs_file (behavior: $BEHAVIOR)"
                temp_clean="${TEMP_DIR}/clean_input"
                grep -v '^[[:space:]]*#' "$file" | sed 's/[[:space:]]*#.*$//' | grep -v '^[[:space:]]*$' > "$temp_clean"
                if [ -s "$temp_clean" ]; then
                  /usr/local/bin/mihomo convert-ruleset "$BEHAVIOR" text "$temp_clean" "$mrs_file"
                fi
              fi
            done
          done
          rm -rf "$TEMP_DIR"

      # 4. 提交变更
      - name: ⬆️ Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Feat: Update MRS from list directories"
          file_pattern: 'mrs/ip/* mrs/domain/*'
