name: Update Add Rules

on:
  schedule:
    # 每天北京时间 3:00 (UTC 19:00)
    - cron: '00 19 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-requests
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: pip install requests

      - name: Download and Process Rules
        run: |
          python << 'EOF'
          import requests
          import re
          import os

          # 确保统一的输出目录存在
          os.makedirs('work/list', exist_ok=True)

          # ==========================================
          # 1. 任务一：下载并处理 dnsmasq-china 数据
          # ==========================================
          dnsmasq_url = "https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/refs/heads/master/accelerated-domains.china.conf"
          try:
              print(f"LOG: Fetching {dnsmasq_url}")
              r = requests.get(dnsmasq_url, timeout=20, headers={'User-Agent': 'Mozilla/5.0'})
              r.raise_for_status()
              
              domains = re.findall(r'^server=/([^/]+)/', r.text, re.MULTILINE)
              dnsmasq_list = [f"+.{d}" for d in domains if d]
              
              with open('work/list/dnsmasq-china_domain.list', 'w', encoding='utf-8') as f:
                  f.write('\n'.join(dnsmasq_list) + '\n')
                  
              print(f"LOG: Saved {len(dnsmasq_list)} items to work/list/dnsmasq-china_domain.list")
          except Exception as e:
              print(f"LOG: Error processing dnsmasq-china: {e}")
              exit(1)

          # ==========================================
          # 2. 任务二：下载并处理 yoyo adservers 数据
          # ==========================================
          yoyo_url = "https://pgl.yoyo.org/adservers/serverlist.php?hostformat=plain&showintro=0&mimetype=plaintext"
          try:
              print(f"LOG: Fetching {yoyo_url}")
              r_yoyo = requests.get(yoyo_url, timeout=20, headers={'User-Agent': 'Mozilla/5.0'})
              r_yoyo.raise_for_status()
              
              ad_list = []
              for line in r_yoyo.text.splitlines():
                  line = line.strip()
                  if line:
                      ad_list.append(f"+.{line}")
                      
              with open('work/list/ad_peter_domain.list', 'w', encoding='utf-8') as f:
                  f.write('\n'.join(ad_list) + '\n')
                  
              print(f"LOG: Saved {len(ad_list)} items to work/list/ad_peter_domain.list")
          except Exception as e:
              print(f"LOG: Error processing yoyo adservers: {e}")
              exit(1)

          # ==========================================
          # 3. 任务三：精确提取 GitHub Meta 指定数据
          # ==========================================
          github_url = "https://api.github.com/meta"
          try:
              print(f"LOG: Fetching {github_url}")
              r_github = requests.get(github_url, timeout=20, headers={'User-Agent': 'Mozilla/5.0'})
              r_github.raise_for_status()
              data = r_github.json()
              
              domains = set()
              
              # 提取指定的域名列表节点
              domain_keys = ['website', 'copilot', 'packages', 'actions', 'codespaces']
              if 'domains' in data:
                  for k in domain_keys:
                      if k in data['domains'] and isinstance(data['domains'][k], list):
                          for d in data['domains'][k]:
                              domains.add(d)
                  
                  # 单独处理 domains 中的 actions_inbound (由于这是一个包含多个子列表的字典)
                  if 'actions_inbound' in data['domains'] and isinstance(data['domains']['actions_inbound'], dict):
                      for sub_v in data['domains']['actions_inbound'].values():
                          if isinstance(sub_v, list):
                              for d in sub_v:
                                  domains.add(d)

              # 域名处理：替换 *. 为 +. 并合并去重
              final_domains = set()
              for d in domains:
                  if d.startswith('*.'):
                      final_domains.add('+' + d[1:])
                  else:
                      final_domains.add(d)

              with open('work/list/github_domain.list', 'w', encoding='utf-8') as f:
                  for d in sorted(final_domains):
                      f.write(d + '\n')

              print(f"LOG: Saved {len(final_domains)} items to work/list/github_domain.list")
          except Exception as e:
              print(f"LOG: Error processing GitHub Meta: {e}")
              exit(1)

          # ==========================================
          # 4. 任务四：下载并处理 enhanced-FaaS-in-China 数据
          # ==========================================
          faas_urls = [
              "https://raw.githubusercontent.com/xingpingcn/enhanced-FaaS-in-China/main/Cf.json",
              "https://raw.githubusercontent.com/xingpingcn/enhanced-FaaS-in-China/main/Netlify.json",
              "https://raw.githubusercontent.com/xingpingcn/enhanced-FaaS-in-China/main/Vercel.json"
          ]
          faas_ips = set()

          for url in faas_urls:
              try:
                  print(f"LOG: Fetching {url}")
                  r_faas = requests.get(url, timeout=20, headers={'User-Agent': 'Mozilla/5.0'})
                  r_faas.raise_for_status()
                  faas_data = r_faas.json()
                  
                  # 动态解析顶层节点 (如 "Cf", "Netlify", "Vercel")
                  for top_key, top_value in faas_data.items():
                      if isinstance(top_value, dict) and "result" in top_value:
                          result_node = top_value["result"]
                          if isinstance(result_node, dict):
                              # 遍历不同的线路（如 dianxin, liantong, yidong, default）
                              for carrier, ip_list in result_node.items():
                                  if isinstance(ip_list, list):
                                      for ip in ip_list:
                                          ip_str = str(ip).strip()
                                          if ip_str:
                                              # 统一格式化为带有掩码的 CIDR 格式
                                              if '/' not in ip_str:
                                                  faas_ips.add(f"{ip_str}/32")
                                              else:
                                                  faas_ips.add(ip_str)
              except Exception as e:
                  print(f"LOG: Error processing {url}: {e}")
                  exit(1)

          try:
              with open('work/list/enhanced-FaaS-in-China_ip.list', 'w', encoding='utf-8') as f:
                  for ip in sorted(faas_ips):
                      f.write(ip + '\n')
              print(f"LOG: Saved {len(faas_ips)} items to work/list/enhanced-FaaS-in-China_ip.list")
          except Exception as e:
              print(f"LOG: Error writing enhanced-FaaS-in-China_ip.list: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加新生成的所有四个文件
          git add work/list/dnsmasq-china_domain.list
          git add work/list/ad_peter_domain.list
          git add work/list/github_domain.list
          git add work/list/enhanced-FaaS-in-China_ip.list
          
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update domains and IP rules $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
