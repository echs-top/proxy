name: Clear History and Cache
on:
  workflow_dispatch: # 允许在网页端手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write # 必须赋予写权限，才能执行删除操作
      contents: read
    steps:
      # 步骤 1：清空所有 GitHub Actions 缓存
      - name: Delete all caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 调用 GitHub 官方 CLI 批量删除所有缓存
          gh cache delete --all || echo "Cache is already empty"

      # 步骤 2：清空所有历史运行记录
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
