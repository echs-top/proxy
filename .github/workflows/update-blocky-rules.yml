name: Update Blocky Rules

on:
  schedule:
    # 北京时间 4:30 (UTC+8)，换算为 UTC 时间是前一天的 20:30
    - cron: '30 20 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Convert Rules to JSON Format
        run: |
          # 确保目标目录存在
          mkdir -p blocky
          
          # 使用 awk 高效拼接单行 JSON，并进行域名去重处理
          curl -sSL https://raw.githubusercontent.com/echs-top/proxy/main/list/domain/blocky-cn.list | \
          tr -d '\r' | \
          grep -v "^#" | grep -v "^$" | \
          sed 's/^[+\.]*//' | \
          awk '
          BEGIN {
              # 初始化 JSON 头部，默认带上 cn 映射
              printf "{\"conditional\":{\"mapping\":{\"cn\":\"223.5.5.5,119.29.29.29\""
          }
          {
              # 去重并拼接键值对
              if ($1 != "" && !seen[$1]) {
                  seen[$1] = 1
                  printf ",\"%s\":\"223.5.5.5,119.29.29.29\"", $1
              }
          }
          END {
              # 闭合 JSON 标签并换行
              print "}}}"
          }' > blocky/cn.yaml

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update blocky cn.yaml to inline json format"
          file_pattern: 'blocky/cn.yaml'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
