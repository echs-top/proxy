name: Update Blocky Rules

on:
  schedule:
    # 北京时间 4:30 (UTC+8)，换算为 UTC 时间是前一天的 20:30
    - cron: '30 20 * * *'
  workflow_dispatch: # 允许你在 Actions 页面手动点击运行，方便测试

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Convert Rules
        run: |
          # 确保目标目录存在
          mkdir -p blocky
          
          # 写入 Blocky YAML 头部格式
          echo "conditional:" > blocky/cn.yaml
          echo "  mapping:" >> blocky/cn.yaml
          
          # 1. curl 获取规则文件
          # 2. tr 删除可能存在的 Windows 回车符(\r)，防止 YAML 格式错乱
          # 3. grep 过滤掉空行和注释行
          # 4. sed 去除开头的 '+.' 或 '.'
          # 5. awk 将域名格式化为 Blocky 需要的键值对，并追加到文件
          curl -sSL https://raw.githubusercontent.com/echs-top/proxy/main/list/domain/blocky-cn.list | \
          tr -d '\r' | \
          grep -v "^#" | grep -v "^$" | \
          sed 's/^[+\.]*//' | \
          awk '{print "    " $1 ": 223.5.5.5, 119.29.29.29"}' >> blocky/cn.yaml

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update blocky cn.yaml rules"
          file_pattern: 'blocky/cn.yaml'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
