name: Update List Rules

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install PyYAML requests

    - name: Process Rules with Domain Subsumption
      run: |
        python - << 'EOF'
        import os
        import yaml
        import requests

        # === 域名规则抽象类 ===
        class DomainRule:
            def __init__(self, raw):
                self.raw = raw
                if raw.startswith('+.'):
                    self.base = raw[2:]
                    self.exact = True  # 允许匹配自身 (baidu.com)
                    self.sub = True    # 允许匹配子域 (www.baidu.com)
                elif raw.startswith('*.'):
                    self.base = raw[2:]
                    self.exact = False # 不匹配自身
                    self.sub = True    # 允许匹配子域
                else:
                    self.base = raw
                    self.exact = True
                    self.sub = False
                # 反转域名分段，比如 www.baidu.com 变为 ['com', 'baidu', 'www']
                self.parts = self.base.split('.')[::-1]

        # === 字典树节点 ===
        class TrieNode:
            def __init__(self):
                self.children = {}
                self.exact = False
                self.sub = False

        def insert_trie(root, rule_obj):
            node = root
            for part in rule_obj.parts:
                if part not in node.children:
                    node.children[part] = TrieNode()
                node = node.children[part]
            if rule_obj.exact: node.exact = True
            if rule_obj.sub: node.sub = True

        def is_covered_by_trie(root, rule_obj):
            node = root
            for i, part in enumerate(rule_obj.parts):
                if part not in node.children:
                    return False
                node = node.children[part]
                
                # 情况1: 当前目标是 Trie中某个节点的子域名
                if i < len(rule_obj.parts) - 1:
                    if node.sub: return True
                # 情况2: 当前目标与 Trie中节点的基础域名完全一致
                else:
                    # Trie 中的节点必须满足目标所要求的所有匹配能力
                    exact_covered = (not rule_obj.exact) or node.exact
                    sub_covered = (not rule_obj.sub) or node.sub
                    if exact_covered and sub_covered:
                        return True
            return False

        def fetch_and_parse(url, fmt):
            try:
                response = requests.get(url, timeout=15)
                response.raise_for_status()
                content = response.text
            except Exception as e:
                print(f"  [错误] 无法下载 {url}: {e}")
                return set()

            result = set()
            if fmt == 'yaml':
                try:
                    data = yaml.safe_load(content)
                    if data and isinstance(data, dict) and 'payload' in data:
                        for item in data['payload']:
                            item_str = str(item).strip("'\" ")
                            if item_str and not item_str.startswith('#'):
                                result.add(item_str)
                except Exception as e:
                    print(f"  [错误] YAML 解析失败: {e}")
            elif fmt == 'list':
                for line in content.splitlines():
                    clean_line = line.split('#')[0].strip("'\" ")
                    if clean_line:
                        result.add(clean_line)
            return result

        def process_directory(work_dir, list_dir, rule_type):
            if not os.path.exists(work_dir):
                return
            os.makedirs(list_dir, exist_ok=True)

            for filename in os.listdir(work_dir):
                if not filename.endswith('.list'):
                    continue
                
                filepath = os.path.join(work_dir, filename)
                out_filepath = os.path.join(list_dir, filename)
                print(f"处理 [{rule_type}] 规则: {filepath}")
                
                includes = set()
                excludes = set()

                with open(filepath, 'r', encoding='utf-8') as f:
                    for line in f:
                        clean_line = line.strip()
                        if not clean_line or clean_line.startswith('#'): continue
                        parts = clean_line.split()
                        if len(parts) >= 3:
                            op, fmt, url = parts[0], parts[1], parts[2]
                            print(f"  [{op}] 获取 {fmt}: {url}")
                            items = fetch_and_parse(url, fmt)
                            if op == '+': includes.update(items)
                            elif op == '-': excludes.update(items)

                final_list = []
                
                if rule_type == 'domain':
                    # 1. 排除阶段：将被 excludes 覆盖的 include 剔除
                    inc_rules = [DomainRule(x) for x in includes]
                    exc_rules = [DomainRule(x) for x in excludes]
                    
                    exc_trie = TrieNode()
                    for r in exc_rules: insert_trie(exc_trie, r)
                    
                    filtered_includes = [r for r in inc_rules if not is_covered_by_trie(exc_trie, r)]
                    
                    # 2. 合并去重阶段：将范围大的规则排在前面优先插入 Trie
                    # 排序：长度越短越靠前，子域通配优先，精确匹配优先
                    filtered_includes.sort(key=lambda r: (len(r.parts), not r.sub, not r.exact))
                    
                    inc_trie = TrieNode()
                    for r in filtered_includes:
                        if not is_covered_by_trie(inc_trie, r):
                            final_list.append(r.raw)
                            insert_trie(inc_trie, r)
                    
                    final_list.sort()
                
                else:
                    # IP 规则处理：IP不涉及层级父子覆盖，直接使用字符串 Set 减法
                    final_set = includes - excludes
                    final_list = sorted(list(final_set))
                
                with open(out_filepath, 'w', encoding='utf-8') as f:
                    for item in final_list:
                        f.write(item + '\n')
                print(f"  ✅ 完成！共 {len(final_list)} 条，已保存\n")

        if __name__ == '__main__':
            process_directory('work/domain', 'list/domain', 'domain')
            process_directory('work/ip', 'list/ip', 'ip')
        EOF

    - name: Check and Commit
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add list/
        
        if git diff --staged --quiet; then
          echo "规则无更新，跳过。"
        else
          git commit -m "Auto-update rules: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
