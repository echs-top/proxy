name: Generate Mihomo Rules

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install PyYAML requests

    - name: Process Rules (Meta-Rules & Inline Support)
      run: |
        python - << 'EOF'
        import os
        import yaml
        import requests
        import ipaddress

        # ================= Domain 结构定义 =================
        class DomainRule:
            def __init__(self, raw):
                self.raw = raw
                if raw.startswith('+.'):
                    self.base = raw[2:]
                    self.exact = True
                    self.sub = True
                    self.weight = 0
                elif raw.startswith('*.'):
                    self.base = raw[2:]
                    self.exact = False
                    self.sub = True
                    self.weight = 1
                else:
                    self.base = raw
                    self.exact = True
                    self.sub = False
                    self.weight = 2
                self.parts = self.base.split('.')[::-1]

        class TrieNode:
            def __init__(self):
                self.children = {}
                self.exact = False
                self.sub = False

        def insert_trie(root, rule_obj):
            node = root
            for part in rule_obj.parts:
                if part not in node.children:
                    node.children[part] = TrieNode()
                node = node.children[part]
            if rule_obj.exact: node.exact = True
            if rule_obj.sub: node.sub = True

        def is_covered_by_trie(root, rule_obj):
            node = root
            for i, part in enumerate(rule_obj.parts):
                if part not in node.children:
                    return False
                node = node.children[part]
                if i < len(rule_obj.parts) - 1:
                    if node.sub: return True
                else:
                    if (not rule_obj.exact or node.exact) and (not rule_obj.sub or node.sub):
                        return True
            return False

        # ================= 智能获取 (内联 / 远程 / 本地) =================
        def fetch_and_parse(target, fmt, output_dir):
            # 1. [新增] 拦截内联单条规则：若用引号包裹，则直接提取为单条规则
            if target.startswith(("'", '"')) and target.endswith(("'", '"')):
                rule = target.strip("'\" ")
                print(f"    [内联] 识别到单条规则: {rule}")
                return {rule} if rule else set()

            content = ""
            # 2. 判断是远程链接还是本地文件
            if target.startswith('http://') or target.startswith('https://'):
                try:
                    response = requests.get(target, timeout=15)
                    response.raise_for_status()
                    content = response.text
                except Exception as e:
                    print(f"    [错误] 无法下载远程链接 {target}: {e}")
                    return set()
            else:
                local_path = os.path.join(output_dir, target)
                try:
                    with open(local_path, 'r', encoding='utf-8') as f:
                        content = f.read()
                except Exception as e:
                    print(f"    [错误] 无法读取本地文件 {local_path} (请确认它已被生成): {e}")
                    return set()

            result = set()
            if fmt == 'yaml':
                try:
                    data = yaml.safe_load(content)
                    if data and isinstance(data, dict) and 'payload' in data:
                        for item in data['payload']:
                            item_str = str(item).strip("'\" ")
                            if item_str and not item_str.startswith('#'):
                                result.add(item_str)
                except Exception as e:
                    print(f"    [错误] YAML 解析失败: {e}")
            elif fmt == 'list':
                for line in content.splitlines():
                    clean_line = line.split('#')[0].strip("'\" ")
                    if clean_line:
                        result.add(clean_line)
            return result

        # ================= 核心处理流 =================
        def process_file(filepath, out_filepath, rule_type, list_dir):
            print(f"\n处理 [{rule_type}] 规则: {os.path.basename(filepath)}")
            
            batches = []
            current_op = None
            current_items = []

            with open(filepath, 'r', encoding='utf-8') as f:
                for line in f:
                    clean_line = line.strip()
                    if not clean_line or clean_line.startswith('#'): continue
                    
                    # [优化] 使用 maxsplit=2，防止由于单条规则内部包含空格而导致切割错位
                    parts = clean_line.split(maxsplit=2)
                    if len(parts) >= 3:
                        op, fmt, target = parts[0], parts[1], parts[2]
                        if op == current_op:
                            current_items.append((fmt, target))
                        else:
                            if current_op is not None:
                                batches.append((current_op, current_items))
                            current_op = op
                            current_items = [(fmt, target)]
            if current_op is not None:
                batches.append((current_op, current_items))

            if rule_type == 'domain':
                master_rules = []
                batch_num = 1
                for op, items in batches:
                    print(f"  -> 执行批次 {batch_num} [{op}] (包含 {len(items)} 项)")
                    batch_num += 1
                    
                    batch_raw_set = set()
                    for fmt, target in items:
                        batch_raw_set.update(fetch_and_parse(target, fmt, list_dir))
                    
                    if op == '+':
                        new_rules = [DomainRule(x) for x in batch_raw_set]
                        combined = master_rules + new_rules
                        combined.sort(key=lambda r: (len(r.parts), not r.sub, not r.exact))
                        trie = TrieNode()
                        next_master = []
                        for r in combined:
                            if not is_covered_by_trie(trie, r):
                                next_master.append(r)
                                insert_trie(trie, r)
                        master_rules = next_master
                    
                    elif op == '-':
                        exc_rules = [DomainRule(x) for x in batch_raw_set]
                        exc_trie = TrieNode()
                        for r in exc_rules: insert_trie(exc_trie, r)
                        master_rules = [r for r in master_rules if not is_covered_by_trie(exc_trie, r)]

                master_rules.sort(key=lambda r: (r.parts, r.weight))
                final_list = [r.raw for r in master_rules]

            elif rule_type == 'ip':
                master_ips_v4 = []
                master_ips_v6 = []
                batch_num = 1
                for op, items in batches:
                    print(f"  -> 执行批次 {batch_num} [{op}] (包含 {len(items)} 项)")
                    batch_num += 1
                    
                    batch_raw_set = set()
                    for fmt, target in items:
                        batch_raw_set.update(fetch_and_parse(target, fmt, list_dir))
                    
                    batch_nets_v4 = []
                    batch_nets_v6 = []
                    for x in batch_raw_set:
                        try:
                            net = ipaddress.ip_network(x, strict=False)
                            if net.version == 4: batch_nets_v4.append(net)
                            else: batch_nets_v6.append(net)
                        except ValueError:
                            pass
                    
                    if op == '+':
                        master_ips_v4 = list(ipaddress.collapse_addresses(master_ips_v4 + batch_nets_v4))
                        master_ips_v6 = list(ipaddress.collapse_addresses(master_ips_v6 + batch_nets_v6))
                    
                    elif op == '-':
                        next_master_v4 = []
                        for inc in master_ips_v4:
                            is_excluded = False
                            for exc in batch_nets_v4:
                                if inc.subnet_of(exc):
                                    is_excluded = True
                                    break
                            if not is_excluded: next_master_v4.append(inc)
                        master_ips_v4 = next_master_v4
                        
                        next_master_v6 = []
                        for inc in master_ips_v6:
                            is_excluded = False
                            for exc in batch_nets_v6:
                                if inc.subnet_of(exc):
                                    is_excluded = True
                                    break
                            if not is_excluded: next_master_v6.append(inc)
                        master_ips_v6 = next_master_v6

                final_list = [str(net) for net in (master_ips_v4 + master_ips_v6)]
            
            with open(out_filepath, 'w', encoding='utf-8') as f:
                for item in final_list:
                    f.write(item + '\n')
            print(f"  ✅ 完成！最终保留 {len(final_list)} 条规则\n")

        def process_directory(work_dir, list_dir, rule_type):
            if not os.path.exists(work_dir):
                return
            os.makedirs(list_dir, exist_ok=True)

            all_files = [f for f in os.listdir(work_dir) if f.endswith('.list')]
            special_files = [f for f in all_files if f.endswith('-ltsc.list') or f.endswith('-lite.list')]
            normal_files = [f for f in all_files if f not in special_files]

            if normal_files:
                print(f"\n========== 开始处理 [{rule_type}] 基础规则 ==========")
            for filename in normal_files:
                filepath = os.path.join(work_dir, filename)
                out_filepath = os.path.join(list_dir, filename)
                process_file(filepath, out_filepath, rule_type, list_dir)

            if special_files:
                print(f"\n========== 开始处理 [{rule_type}] LTSC/LITE 复合规则 ==========")
            for filename in special_files:
                filepath = os.path.join(work_dir, filename)
                out_filepath = os.path.join(list_dir, filename)
                process_file(filepath, out_filepath, rule_type, list_dir)

        if __name__ == '__main__':
            process_directory('work/domain', 'list/domain', 'domain')
            process_directory('work/ip', 'list/ip', 'ip')
        EOF

    - name: Check and Commit
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add list/
        
        if git diff --staged --quiet; then
          echo "规则无更新，跳过。"
        else
          git commit -m "Auto-update rules: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
